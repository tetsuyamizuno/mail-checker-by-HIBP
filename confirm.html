<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>確認を完了 - メールアドレス漏えいチェッカー by HIBP</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <main class="container narrow">
      <section class="card">
        <span class="eyebrow">確認メールフロー</span>
        <h1>確認を完了してください</h1>
        <p class="lead">
          下のボタンを押すと、確認トークンを検証し、HIBP で照会した結果をメールで送信します。
        </p>
        <div class="stack">
          <button id="confirm-button" type="button">確認して結果メールを送信</button>
          <div id="status" class="status hidden"></div>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/confirm.js"></script>
  </body>
</html>
