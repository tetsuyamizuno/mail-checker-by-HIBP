<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>確認を完了 - メールアドレス漏えいチェッカー by HIBP</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <main class="container narrow">
      <!-- 処理中カード -->
      <section class="card" id="loading-card">
        <span class="eyebrow">確認メールフロー</span>
        <h1>確認を完了してください</h1>
        <p class="lead">
          下のボタンを押すと、確認トークンを検証し、HIBP で照会した結果をメールで送信します。
        </p>
        <div class="stack">
          <button id="confirm-button" type="button">確認して結果メールを送信</button>
          <div id="status" class="status hidden"></div>
        </div>
      </section>

      <!-- 漏えい結果カード（JS で生成して表示） -->
      <section class="card result-card hidden" id="result-card">
        <div class="result-header" id="result-header">
          <!-- JS で生成 -->
        </div>
        <div id="breach-list">
          <!-- JS で生成 -->
        </div>
        <div class="result-footer hidden" id="result-footer">
          <a href="/" class="btn-check-another">別のアドレスをチェック</a>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/confirm.js"></script>
  </body>
</html>
